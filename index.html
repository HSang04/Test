<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tra Cứu Tài Khoản</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080c10;
      --panel:        #0e1419;
      --card:         #131920;
      --border:       rgba(255,255,255,0.07);
      --border-lit:   rgba(255,255,255,0.13);
      --accent:       #4f9eff;
      --accent-dim:   rgba(79,158,255,0.12);
      --accent-glow:  rgba(79,158,255,0.25);
      --green:        #34d399;
      --green-dim:    rgba(52,211,153,0.10);
      --yellow:       #fbbf24;
      --yellow-dim:   rgba(251,191,36,0.10);
      --red:          #f87171;
      --t1:           #f0f4f8;
      --t2:           #7a8a9a;
      --t3:           #3a4a5a;
      --r:            14px;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ambient glow blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.25;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1a4a8a 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #0a3a2a 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    #app {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-ring {
      width: 56px; height: 56px;
      margin: 0 auto 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1a3a6a, #0a2a4a);
      border: 1px solid var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--t1);
    }

    .header p {
      font-size: 0.78rem;
      color: var(--t2);
      margin-top: 4px;
      font-weight: 300;
    }

    /* ── SEARCH BOX ── */
    .search-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
    }

    .stk-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      letter-spacing: .04em;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .stk-input::placeholder { color: var(--t3); font-size: 0.85rem; font-family: 'Sora', sans-serif; letter-spacing: 0; }
    .stk-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn-search {
      padding: 12px 18px;
      background: var(--accent);
      color: #05080c;
      border: none; border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, box-shadow .2s, transform .1s;
    }
    .btn-search:hover  { background: #6aadff; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-search:active { transform: scale(.97); }

    /* ── RESULT ── */
    #result-wrap {
      animation: fadeUp .3s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    /* coloured top stripe */
    .result-card::before {
      content: '';
      display: block;
      height: 3px;
    }
    .result-card.found::before    { background: linear-gradient(90deg, var(--green), transparent); }
    .result-card.not-found::before { background: linear-gradient(90deg, var(--red), transparent); }

    .result-inner { padding: 18px 20px; }

    .r-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
    }
    .r-row + .r-row { border-top: 1px solid var(--border); }

    .r-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .r-value {
      font-size: 0.93rem;
      font-weight: 600;
      color: var(--t1);
      text-align: right;
    }

    .r-value.stk-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      color: var(--accent);
      letter-spacing: .05em;
    }

    .r-value.bal-val {
      font-size: 1.15rem;
      color: var(--green);
      letter-spacing: -.01em;
    }

    /* interest row */
    .interest-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 11px 0;
      border-top: 1px solid var(--border);
    }

    .interest-right { text-align: right; }
    .int-amount {
      font-size: 0.93rem;
      font-weight: 600;
      color: var(--yellow);
    }
    .int-sub {
      font-size: 0.72rem;
      color: var(--t2);
      margin-top: 3px;
      line-height: 1.5;
    }
    .int-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--yellow-dim);
      border: 1px solid rgba(251,191,36,0.3);
      color: var(--yellow);
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      margin-top: 6px;
      letter-spacing: .02em;
    }

    /* not found */
    .nf-body {
      padding: 28px 20px;
      text-align: center;
    }
    .nf-icon { font-size: 32px; margin-bottom: 10px; }
    .nf-title { font-size: 0.95rem; font-weight: 600; color: var(--red); margin-bottom: 4px; }
    .nf-sub   { font-size: 0.78rem; color: var(--t2); }
    .nf-sub strong { color: var(--t1); font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

  <div id="app">

    <div class="header">
      <div class="logo-ring">🏦</div>
      <h1>Tra Cứu Số Dư</h1>
      <p>Hệ thống nội bộ gia đình</p>
    </div>

    <div class="search-box">
      <div class="input-wrap">
        <input class="stk-input" id="stk-input" type="text"
               placeholder="Nhập số tài khoản..."
               autocomplete="off"
               onkeydown="if(event.key==='Enter') search()"/>
        <button class="btn-search" onclick="search()">Tìm</button>
      </div>
    </div>

    <div id="result-wrap"></div>

  </div>

<script>
  // ── DỮ LIỆU ─────────────────────────────────────────────────────────────
  // Cột: stk, name, balance, interest_day, interest_amount
  //   interest_day    = ngày cộng lãi (1-31). Để trống = không có lãi
  //   interest_amount = số tiền lãi cố định mỗi tháng (đồng)
  const CSV_DATA = `stk,name,balance,interest_day,interest_amount
2904,Trần Huỳnh Tuyết Minh,980000,15,60000
789012,Vũ Phạm Đình,1200000,15,80000
1,Huỳnh Huyền,0,,
111222,Test,750000,10,30000
333444,Hehe,9800000,1,200000`;
  // ─────────────────────────────────────────────────────────────────────────

  let db = {};

  (function loadCSV() {
    CSV_DATA.trim().split('\n').slice(1).forEach(line => {
      const [stk, name, balance, iday, iamt] = line.split(',').map(s => s.trim());
      if (stk) db[stk] = {
        name,
        balance:  parseInt(balance, 10) || 0,
        iday:     iday ? parseInt(iday, 10) : null,
        iamt:     iamt ? parseInt(iamt, 10) : null,
      };
    });
  })();

  const fmt = n => n.toLocaleString('vi-VN') + '\u202f₫';

  function nextDate(day) {
    const t = new Date(), m = new Date(t.getFullYear(), t.getMonth(), day);
    return t <= m ? m : new Date(t.getFullYear(), t.getMonth() + 1, day);
  }

  function fmtDate(d) {
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  }

  function search() {
    const stk = document.getElementById('stk-input').value.trim();
    const wrap = document.getElementById('result-wrap');

    if (!stk) { wrap.innerHTML = ''; return; }

    // re-trigger animation
    wrap.style.animation = 'none';
    void wrap.offsetWidth;
    wrap.style.animation = '';

    const r = db[stk];
    if (!r) {
      wrap.innerHTML = `
        <div class="result-card not-found">
          <div class="nf-body">
            <div class="nf-icon">🔍</div>
            <div class="nf-title">Không tìm thấy</div>
            <div class="nf-sub">STK <strong>${stk}</strong> không tồn tại trong hệ thống</div>
          </div>
        </div>`;
      return;
    }

    let intHTML = '';
    if (r.iday && r.iamt) {
      const next    = nextDate(r.iday);
      const isToday = next.toDateString() === new Date().toDateString();
      intHTML = `
        <div class="interest-row">
          <span class="r-label">Lãi hàng tháng</span>
          <div class="interest-right">
            <div class="int-amount">+${fmt(r.iamt)}</div>
            <div class="int-sub">Ngày <strong>${r.iday}</strong> mỗi tháng &nbsp;·&nbsp; Lần tới <strong>${fmtDate(next)}</strong></div>
            ${isToday ? '<span class="int-badge">💰 Hôm nay cộng lãi!</span>' : ''}
          </div>
        </div>`;
    }

    wrap.innerHTML = `
      <div class="result-card found">
        <div class="result-inner">
          <div class="r-row">
            <span class="r-label">Số tài khoản</span>
            <span class="r-value stk-val">${stk}</span>
          </div>
          <div class="r-row">
            <span class="r-label">Chủ tài khoản</span>
            <span class="r-value">${r.name}</span>
          </div>
          <div class="r-row">
            <span class="r-label">Số dư</span>
            <span class="r-value bal-val">${fmt(r.balance)}</span>
          </div>
          ${intHTML}
        </div>
      </div>`;
  }
</script>
</body>
</html>
